<svg viewBox="0 0 720 430" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system, system-ui, sans-serif"><title>MAP = 似然 × 先验：先验把后验峰从似然峰往中心拉</title><defs><marker id="arrowHead" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#d97706"/></marker><marker id="axisArrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/></marker></defs><text x="360" y="30" text-anchor="middle" font-size="16" font-weight="600" fill="#1f2937">MAP = 似然 × 先验</text><line x1="70" y1="350" x2="690" y2="350" stroke="#94a3b8" stroke-width="1" marker-end="url(#axisArrow)"/><line x1="70" y1="350" x2="70" y2="60" stroke="#94a3b8" stroke-width="1" marker-end="url(#axisArrow)"/><text x="695" y="372" text-anchor="end" font-size="14" fill="#1f2937">θ</text><text x="58" y="70" text-anchor="end" font-size="12" fill="#1f2937">密度</text><text x="380" y="364" text-anchor="middle" font-size="11" fill="#94a3b8">中心(0/公平)</text><line x1="380" y1="346" x2="380" y2="354" stroke="#94a3b8" stroke-width="1"/><path d="M70,348 C260,348 290,150 380,150 C470,150 500,348 690,348" fill="#2563eb" fill-opacity="0.08" stroke="#2563eb" stroke-width="2"/><path d="M70,349 C420,349 470,110 540,110 C610,110 640,349 690,349" fill="#db2777" fill-opacity="0.08" stroke="#db2777" stroke-width="2"/><path d="M70,349 C400,349 445,90 500,90 C560,90 600,349 690,349" fill="#d97706" fill-opacity="0.12" stroke="#d97706" stroke-width="2"/><line x1="540" y1="349" x2="540" y2="110" stroke="#db2777" stroke-width="1" stroke-dasharray="4 3"/><line x1="380" y1="349" x2="380" y2="150" stroke="#2563eb" stroke-width="1" stroke-dasharray="4 3"/><line x1="500" y1="349" x2="500" y2="90" stroke="#d97706" stroke-width="1" stroke-dasharray="4 3"/><circle cx="540" cy="110" r="3" fill="#db2777"/><circle cx="380" cy="150" r="3" fill="#2563eb"/><circle cx="500" cy="90" r="3" fill="#d97706"/><line x1="500" y1="378" x2="380" y2="378" stroke="#d97706" stroke-width="2" marker-end="url(#arrowHead)"/><text x="500" y="398" text-anchor="middle" font-size="12" fill="#d97706" font-weight="600">先验把后验峰往中心拉</text><g><rect x="498" y="172" width="14" height="3" fill="#db2777"/><text x="518" y="178" font-size="12" fill="#1f2937">prior 先验（宽，峰在中央）</text><rect x="498" y="192" width="14" height="3" fill="#2563eb"/><text x="518" y="198" font-size="12" fill="#1f2937">likelihood 似然（窄，峰偏右）</text><rect x="498" y="212" width="14" height="3" fill="#d97706"/><text x="518" y="218" font-size="12" fill="#1f2937">posterior 后验（落在两者之间）</text></g><text x="360" y="424" text-anchor="middle" font-size="12" fill="#1f2937">数据越少似然越胖，先验拉得越动；数据越多似然越尖，先验几乎拉不动。</text></svg>