<svg viewBox="0 0 520 320" role="img" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, system-ui, sans-serif"><title>高斯先验对应 L2 正则、拉普拉斯先验在 0 处尖角对应 L1 稀疏</title><line x1="60" y1="250" x2="490" y2="250" stroke="#94a3b8" stroke-width="1"/><line x1="275" y1="270" x2="275" y2="40" stroke="#94a3b8" stroke-width="1"/><line x1="275" y1="250" x2="275" y2="55" stroke="#e2e8f0" stroke-width="0.75" stroke-dasharray="4 3"/><text x="269" y="266" font-size="12" fill="#1f2937" text-anchor="end">0</text><text x="483" y="266" font-size="13" fill="#1f2937" font-style="italic">w</text><text x="60" y="40" font-size="12" fill="#1f2937" text-anchor="start">先验密度</text><path d="M60 248 C 150 245, 215 235, 245 200 C 262 180, 270 80, 275 70 C 280 80, 288 180, 305 200 C 335 235, 400 245, 490 248 Z" fill="#2563eb" fill-opacity="0.10" stroke="#2563eb" stroke-width="2" stroke-linejoin="round"/><polyline points="60,243 275,98 490,243" fill="#db2777" fill-opacity="0.08" stroke="none"/><polyline points="60,243 275,98 490,243" fill="none" stroke="#db2777" stroke-width="2" stroke-linejoin="miter"/><circle cx="275" cy="98" r="3" fill="#db2777"/><path d="M338 122 Q 305 108, 286 98" fill="none" stroke="#d97706" stroke-width="1.5"/><polygon points="286,98 295,99 292,106" fill="#d97706"/><text x="342" y="120" font-size="12" fill="#d97706">尖角 (cusp)</text><text x="342" y="135" font-size="11" fill="#d97706">稀疏的来源</text><circle cx="245" cy="79" r="3" fill="#2563eb"/><path d="M170 95 Q 210 82, 240 79" fill="none" stroke="#94a3b8" stroke-width="1"/><text x="166" y="92" font-size="11" fill="#1f2937" text-anchor="end">圆顶</text><rect x="318" y="178" width="14" height="3" fill="#2563eb"/><text x="338" y="183" font-size="12" fill="#1f2937">高斯先验 ∝ exp(−w²/2)</text><text x="338" y="199" font-size="11" fill="#64748b">L2 正则：平滑收缩，少为 0</text><rect x="318" y="214" width="14" height="3" fill="#db2777"/><text x="338" y="219" font-size="12" fill="#1f2937">拉普拉斯先验 ∝ exp(−|w|)</text><text x="338" y="235" font-size="11" fill="#64748b">L1 正则：尖峰鼓励恰好为 0</text></svg>