<svg viewBox="0 0 720 340" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system, system-ui, sans-serif"><title>PMF 读高度 vs PDF 读面积</title><defs><marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto-start-reverse"><path d="M0,0 L8,4 L0,8 Z" fill="#94a3b8"/></marker><clipPath id="ab-clip"><rect x="442" y="40" width="218" height="210"/></clipPath></defs><line x1="360" y1="40" x2="360" y2="300" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4 3"/><text x="180" y="28" text-anchor="middle" font-size="14" font-weight="bold" fill="#1f2937">离散：PMF p(x)</text><text x="42" y="60" font-size="11" fill="#94a3b8">概率</text><line x1="48" y1="250" x2="48" y2="65" stroke="#94a3b8" stroke-width="1" marker-end="url(#arr)"/><line x1="48" y1="250" x2="320" y2="250" stroke="#94a3b8" stroke-width="1" marker-end="url(#arr)"/><text x="322" y="266" font-size="11" fill="#94a3b8">x</text><line x1="48" y1="92" x2="60" y2="92" stroke="#e2e8f0" stroke-width="0.75"/><text x="44" y="96" text-anchor="end" font-size="11" fill="#94a3b8">0.4</text><line x1="48" y1="171" x2="60" y2="171" stroke="#e2e8f0" stroke-width="0.75"/><text x="44" y="175" text-anchor="end" font-size="11" fill="#94a3b8">0.2</text><rect x="68" y="210" width="32" height="40" fill="#2563eb" opacity="0.85"/><text x="84" y="202" text-anchor="middle" font-size="11" fill="#1f2937">0.1</text><text x="84" y="266" text-anchor="middle" font-size="12" fill="#1f2937">0</text><rect x="118" y="171" width="32" height="79" fill="#2563eb" opacity="0.85"/><text x="134" y="163" text-anchor="middle" font-size="11" fill="#1f2937">0.2</text><text x="134" y="266" text-anchor="middle" font-size="12" fill="#1f2937">1</text><rect x="168" y="92" width="32" height="158" fill="#2563eb" opacity="0.85"/><text x="184" y="84" text-anchor="middle" font-size="11" fill="#1f2937">0.4</text><text x="184" y="266" text-anchor="middle" font-size="12" fill="#1f2937">2</text><rect x="218" y="171" width="32" height="79" fill="#2563eb" opacity="0.85"/><text x="234" y="163" text-anchor="middle" font-size="11" fill="#1f2937">0.2</text><text x="234" y="266" text-anchor="middle" font-size="12" fill="#1f2937">3</text><rect x="268" y="210" width="32" height="40" fill="#2563eb" opacity="0.85"/><text x="284" y="202" text-anchor="middle" font-size="11" fill="#1f2937">0.1</text><text x="284" y="266" text-anchor="middle" font-size="12" fill="#1f2937">4</text><text x="184" y="294" text-anchor="middle" font-size="12" fill="#2563eb">柱子高度 = 概率，Σp(x)=1</text><text x="540" y="28" text-anchor="middle" font-size="14" font-weight="bold" fill="#1f2937">连续：PDF f(x)</text><text x="396" y="60" font-size="11" fill="#94a3b8">密度</text><line x1="400" y1="250" x2="400" y2="65" stroke="#94a3b8" stroke-width="1" marker-end="url(#arr)"/><line x1="400" y1="250" x2="700" y2="250" stroke="#94a3b8" stroke-width="1" marker-end="url(#arr)"/><text x="702" y="266" font-size="11" fill="#94a3b8">x</text><line x1="400" y1="100" x2="408" y2="100" stroke="#94a3b8" stroke-width="0.75"/><text x="396" y="104" text-anchor="end" font-size="11" fill="#94a3b8">1</text><path d="M414,250 C450,247 470,165 495,118 C512,86 535,86 552,128 C575,185 600,243 686,250 L686,250 L414,250 Z" fill="#2563eb" opacity="0.08"/><path d="M414,250 C450,247 470,165 495,118 C512,86 535,86 552,128 C575,185 600,243 686,250 L686,250 L414,250 Z" fill="#2563eb" opacity="0.22" clip-path="url(#ab-clip)"/><path d="M414,250 C450,247 470,165 495,118 C512,86 535,86 552,128 C575,185 600,243 686,250" fill="none" stroke="#2563eb" stroke-width="2"/><line x1="442" y1="250" x2="442" y2="236" stroke="#2563eb" stroke-width="1" stroke-dasharray="4 3"/><text x="442" y="266" text-anchor="middle" font-size="12" fill="#1f2937">a</text><text x="660" y="266" text-anchor="middle" font-size="12" fill="#1f2937">b</text><text x="548" y="205" text-anchor="middle" font-size="12" fill="#2563eb">这块面积 = P(a≤X≤b)</text><line x1="400" y1="100" x2="690" y2="100" stroke="#d97706" stroke-width="1" stroke-dasharray="4 3"/><text x="690" y="96" text-anchor="end" font-size="12" fill="#d97706">f(x) 可以 >1（密度≠概率）</text><line x1="610" y1="220" x2="610" y2="232" stroke="#db2777" stroke-width="1"/><circle cx="610" cy="220" r="2.5" fill="#db2777"/><text x="610" y="248" text-anchor="middle" font-size="12" fill="#db2777">c</text><text x="618" y="304" text-anchor="middle" font-size="12" fill="#db2777">单点 P(X=c)=0（线宽为零→面积为零）</text><text x="540" y="324" text-anchor="middle" font-size="12" fill="#1f2937" font-weight="bold">PMF 读高度，PDF 读面积</text></svg>