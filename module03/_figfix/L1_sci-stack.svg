<svg viewBox="0 0 820 480" xmlns="http://www.w3.org/2000/svg" role="img" font-family="system-ui, -apple-system, sans-serif">
  <title>Python 科学计算栈分工图</title>
  <desc>NumPy 是地基，SciPy、Pandas、Matplotlib、scikit-learn 四个上层库都依赖它的数组结构。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <line x1="175" y1="118" x2="345" y2="358" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="645" y1="118" x2="475" y2="358" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="160" y1="248" x2="335" y2="380" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="660" y1="248" x2="485" y2="380" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="60" y="58" width="230" height="60" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="175" y="82" text-anchor="middle" font-size="17" font-weight="700" fill="#1e3a8a">SciPy</text>
  <text x="175" y="104" text-anchor="middle" font-size="12" fill="#1f2937">科学算法：优化 · 积分 · 分解</text>
  <text x="175" y="135" text-anchor="middle" font-size="11" fill="#64748b">depends on ↓</text>
  <rect x="530" y="58" width="230" height="60" rx="12" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
  <text x="645" y="82" text-anchor="middle" font-size="17" font-weight="700" fill="#166534">Pandas</text>
  <text x="645" y="104" text-anchor="middle" font-size="12" fill="#1f2937">带标签的表格 DataFrame</text>
  <text x="645" y="135" text-anchor="middle" font-size="11" fill="#64748b">depends on ↓</text>
  <rect x="45" y="188" width="230" height="60" rx="12" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="160" y="212" text-anchor="middle" font-size="17" font-weight="700" fill="#9a3412">Matplotlib</text>
  <text x="160" y="234" text-anchor="middle" font-size="12" fill="#1f2937">画图：曲线 · 散点 · 直方</text>
  <text x="160" y="265" text-anchor="middle" font-size="11" fill="#64748b">depends on ↓</text>
  <rect x="545" y="188" width="230" height="60" rx="12" fill="#fdf2f8" stroke="#db2777" stroke-width="2"/>
  <text x="660" y="212" text-anchor="middle" font-size="17" font-weight="700" fill="#9d174d">scikit-learn</text>
  <text x="660" y="234" text-anchor="middle" font-size="12" fill="#1f2937">经典机器学习</text>
  <text x="660" y="265" text-anchor="middle" font-size="11" fill="#64748b">depends on ↓</text>
  <rect x="280" y="358" width="260" height="74" rx="14" fill="#2563eb" stroke="#1e40af" stroke-width="2"/>
  <text x="410" y="390" text-anchor="middle" font-size="24" font-weight="800" fill="#ffffff">NumPy</text>
  <text x="410" y="414" text-anchor="middle" font-size="12.5" fill="#dbeafe">数值数组 · 整个栈的地基</text>
  <text x="410" y="466" text-anchor="middle" font-size="13" fill="#1f2937">Python 科学计算栈分工：NumPy 是地基，上层四个库都依赖它的数组结构。</text>
</svg>
